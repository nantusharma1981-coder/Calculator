# GitHub रिपॉजिटरी में 'codemagic.yaml' नाम से फाइल बनाएं और इसे पेस्ट करें।
workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      android_sdk: 33
      xcode: latest
    scripts:
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
      
