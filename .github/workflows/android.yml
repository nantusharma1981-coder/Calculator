name: Android Master CI (Ultra-Safe)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # मैन्युअल बिल्ड शुरू करने के लिए

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. रिपॉजिटरी से आपका कोड उठाना
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Android के लिए ज़रूरी Java 17 सेट करना
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # कैशिंग से बिल्ड की स्पीड दोगुनी हो जाएगी

      # 3. Gradle को रन करने की परमिशन देना
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. सिर्फ APK बनाना (बिना किसी फालतू टेस्टिंग या लिंटिंग के, ताकि कोई एरर न आए)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. तैयार हुए APK को GitHub पर अपलोड करना ताकि आप डाउनलोड कर सकें
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
